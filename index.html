<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sridhani Shoppy | Exclusive Boutique</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      html { scroll-behavior: smooth; }
      body { 
        font-family: 'Poppins', sans-serif; 
        background: #FFF1F2; 
        color: #4C0519; 
        overflow-x: hidden; min-height: 100vh;
      }
      .font-fashion { font-family: 'Playfair Display', serif; }
      
      .title-3d {
        text-shadow: 0 1px 0 #831843, 0 2px 0 #831843, 0 3px 0 #831843, 
                     0 10px 15px rgba(131, 24, 67, 0.25);
      }
      .gradient-bg { background: linear-gradient(135deg, #9F1239 0%, #E11D48 100%); }
      .marquee-bg { background: linear-gradient(90deg, #9F1239, #E11D48, #9F1239); }

      /* REALISTIC 3D BUTTON EFFECTS */
      .btn-3d-primary {
        background-color: #E11D48; color: white;
        box-shadow: 0 6px 0 #9F1239, 0 10px 15px rgba(225, 29, 72, 0.3);
        transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(0);
      }
      .btn-3d-primary:active { transform: translateY(6px); box-shadow: 0 0px 0 #9F1239, 0 0px 0 rgba(0,0,0,0); }

      .btn-3d-close {
        background-color: #F1F5F9; color: #334155; box-shadow: 0 4px 0 #CBD5E1; transition: all 0.1s;
      }
      .btn-3d-close:active { transform: translateY(4px); box-shadow: 0 0px 0 #CBD5E1; }

      .btn-action {
        background-color: #FCE7F3; color: #9F1239; border: 1px solid #FBCFE8;
        width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
        border-radius: 8px; font-weight: bold; font-size: 16px;
      }
      .btn-action:active { background-color: #FBCFE8; transform: scale(0.9); }

      .nav-item-3d { transition: all 0.1s ease-in-out; }
      .nav-item-3d:active { transform: translateY(4px) scale(0.92); }

      @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-12px); } 100% { transform: translateY(0px); } }
      .animate-float { animation: float 6s ease-in-out infinite; }

      .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
      .reveal.active { opacity: 1; transform: translateY(0); }

      .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(225, 29, 72, 0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
      .floating-nav { box-shadow: 0 20px 40px rgba(159, 18, 57, 0.15); backdrop-filter: blur(15px); }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // ALL PRODUCTS DATA
      const allProducts = [
        { id: 1, name: "Baby Girl Striped Frock", price: 80, category: "Kids Wear", img: "https://images.unsplash.com/photo-1518831959646-742c3e14ebf3?auto=format&fit=crop&w=400&q=80" },
        { id: 2, name: "Kids Dungri Set", price: 250, category: "Kids Wear", img: "https://images.unsplash.com/photo-1519241047957-be31d7379a5d?auto=format&fit=crop&w=400&q=80" },
        { id: 3, name: "2 Pcs Combo Set", price: 250, category: "Combo Offer", img: "https://images.unsplash.com/photo-1622290291468-a28f7a7dc6a8?auto=format&fit=crop&w=400&q=80" },
        { id: 4, name: "Blue Sequin Party Frock", price: 300, category: "Party Wear", img: "https://images.unsplash.com/photo-1587241321921-91a834d6d191?auto=format&fit=crop&w=400&q=80" },
        { id: 5, name: "Red Velvet Frock", price: 300, category: "Party Wear", img: "https://images.unsplash.com/photo-1515442261605-65987783cb6a?auto=format&fit=crop&w=400&q=80" },
        { id: 6, name: "Women's Embroidered Kurti", price: 350, category: "Women's Wear", img: "https://images.unsplash.com/photo-1583391733958-d15a883fa5e9?auto=format&fit=crop&w=400&q=80" },
        { id: 7, name: "Women's Casual Kurti", price: 319, category: "Women's Wear", img: "https://images.unsplash.com/photo-1604644401890-0bd678c83788?auto=format&fit=crop&w=400&q=80" },
        { id: 8, name: "Baby Girl Net Ruffle Frock", price: 150, category: "Kids Wear", img: "https://images.unsplash.com/photo-1596870230751-ebdfce98ec42?auto=format&fit=crop&w=400&q=80" }
      ];

      function App() {
        const [cart, setCart] = useState([]);
        const [searchTerm, setSearchTerm] = useState("");
        const [activeTab, setActiveTab] = useState('about');
        
        // Modal States
        const [isMenuSheetOpen, setIsMenuSheetOpen] = useState(false); 
        const [isCartSheetOpen, setIsCartSheetOpen] = useState(false);

        // Group cart items to show quantity
        const uniqueCartItems = [...new Set(cart.map(item => item.id))].map(id => {
           const item = allProducts.find(p => p.id === id);
           const count = cart.filter(i => i.id === id).length;
           return { ...item, count };
        });

        const cartTotal = cart.reduce((sum, item) => sum + item.price, 0);
        
        // Filter for Search Bar
        const filteredProducts = allProducts.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));

        // Cart Functions
        const addToCart = (product) => {
          setCart([...cart, product]);
          if (navigator.vibrate) navigator.vibrate(40);
        };

        const removeFromCart = (productId) => {
          const index = cart.findIndex(item => item.id === productId);
          if(index > -1) {
            const newCart = [...cart];
            newCart.splice(index, 1);
            setCart(newCart);
            if(newCart.length === 0) setIsCartSheetOpen(false); 
          }
          if (navigator.vibrate) navigator.vibrate(40);
        };

        // WhatsApp Checkout
        const handleWhatsAppCheckout = () => {
          if(cart.length === 0) return;
          let message = "🛍️ *New Order from Sridhani Shoppy* 🛍️\n\nHi, I want to order these items:\n\n";
          uniqueCartItems.forEach((item, index) => { 
            message += `${index + 1}. *${item.name}* (Qty: ${item.count}) - ₹${item.price * item.count}\n`; 
          });
          message += `\n💰 *Total Amount: ₹${cartTotal}*\n\nPlease confirm my order!`;
          window.open(`https://wa.me/918220280807?text=${encodeURIComponent(message)}`, '_blank');
        };

        // Scroll Animation logic
        useEffect(() => {
          const handleScroll = () => {
            document.querySelectorAll('.reveal').forEach(el => {
              if (el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active');
            });
          };
          window.addEventListener('scroll', handleScroll);
          handleScroll();
          return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        return (
          <div className="relative pb-40 overflow-hidden min-h-screen" id="about">
            
            {/* Decorative Background */}
            <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-[#FBCFE8] rounded-full mix-blend-multiply filter blur-[100px] opacity-50 z-0 pointer-events-none"></div>

            {/* Top Bar */}
            <div className="marquee-bg text-white py-2 overflow-hidden whitespace-nowrap shadow-md relative z-10">
              <div className="inline-block animate-pulse px-4 font-bold text-[11px] uppercase tracking-widest">
                🔥 Year End Sale Live! | Free Delivery Over ₹2000 | New Arrivals in Malli Store 👗
              </div>
            </div>

            {/* HEADER & SEARCH */}
            <header className="relative pt-10 pb-6 px-6 flex flex-col items-center z-10">
                 
                 {/* LOGO */}
                 <div className="w-20 h-20 mb-3 bg-[#9F1239] rounded-full flex flex-col items-center justify-center text-white shadow-xl border-4 border-white">
                    <span className="font-fashion font-bold text-3xl leading-none">SS</span>
                 </div>
                 
                 <h1 className="font-fashion font-extrabold italic title-3d flex flex-col text-center cursor-default" style={{ color: '#E11D48' }}>
                   <span className="text-4xl mb-1">Sridhani Shoppy</span>
                 </h1>
                 <p className="text-[10px] font-black tracking-[0.2em] uppercase mt-1 opacity-70" style={{ color: '#9F1239' }}>
                   Premium Kids & Women's Wear
                 </p>
                 
                 {/* SEARCH BAR */}
                 <div className="w-full max-w-md mt-6 relative reveal">
                   <input 
                     type="text" placeholder="Search dresses, frocks..." 
                     className="w-full px-5 py-3 rounded-2xl glass-card outline-none text-sm shadow-inner"
                     onChange={(e) => setSearchTerm(e.target.value)}
                   />
                   <span className="absolute right-5 top-3.5 opacity-30 text-lg">🔍</span>
                 </div>
            </header>

            {/* HERO SLIDER & TIMER */}
            <section className="px-6 mt-2 reveal z-10 relative">
              <div className="h-44 rounded-[2.5rem] overflow-hidden relative shadow-2xl border-4 border-white">
                <img src="https://images.unsplash.com/photo-1595777457583-95e059d581b8?auto=format&fit=crop&w=800" className="w-full h-full object-cover animate-pulse" />
                <div className="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent flex flex-col justify-end p-6">
                  <span className="text-white font-bold text-lg">Special Combo Offers</span>
                  <p className="text-pink-200 text-xs">Grab your deal today!</p>
                </div>
              </div>
              
              {/* Timer */}
              <div className="flex justify-center mt-5">
                 <div className="bg-white px-5 py-2 rounded-full shadow-sm border border-pink-100 flex items-center gap-3">
                    <span className="text-[10px] font-bold text-gray-400 uppercase">Sale Ends in:</span>
                    <span className="text-[#E11D48] font-black text-sm">02d : 14h : 45m</span>
                 </div>
              </div>
            </section>

            {/* TRENDING PRODUCTS (Uses Search Filter) */}
            <section id="shop" className="max-w-7xl mx-auto px-6 py-10 relative z-10 reveal">
              <div className="flex flex-col items-center mb-6">
                <h2 className="font-fashion text-3xl font-extrabold text-center" style={{ color: '#4C0519' }}>Trending Styles</h2>
                <div className="w-12 h-1 mt-2 rounded-full" style={{ backgroundColor: '#E11D48' }}></div>
              </div>
              
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {filteredProducts.slice(0, 6).map(item => (
                  <div key={item.id} className="glass-card rounded-[2rem] p-2 flex flex-col group cursor-pointer hover:scale-105 transition-transform">
                    <div className="overflow-hidden rounded-2xl mb-2 relative">
                      <img src={item.img} className="h-36 w-full object-cover" alt={item.name} />
                    </div>
                    <h3 className="font-bold text-[11px] px-1 truncate" style={{ color: '#4C0519' }}>{item.name}</h3>
                    
                    <div className="flex justify-between items-center mt-auto pt-2 px-1 pb-1">
                      <span className="text-sm font-black" style={{ color: '#9F1239' }}>₹{item.price}</span>
                      <button onClick={(e) => { e.stopPropagation(); addToCart(item); }} className="btn-3d-primary w-8 h-8 rounded-xl text-lg font-black flex items-center justify-center pb-1">
                        +
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* CATEGORIES SECTION */}
            <section id="categories" className="max-w-7xl mx-auto px-6 py-4 relative z-10 reveal">
              <div className="flex flex-col items-center mb-6">
                <h2 className="font-fashion text-3xl font-extrabold text-center" style={{ color: '#4C0519' }}>Categories</h2>
                <div className="w-12 h-1 mt-2 rounded-full" style={{ backgroundColor: '#E11D48' }}></div>
              </div>
              
              <div className="grid grid-cols-2 gap-3">
                {[
                  { name: "Kids Wear" }, { name: "Women's Kurtis" }, { name: "Party Frocks" }, { name: "Combo Offers" }
                ].map((cat, idx) => (
                  <div key={idx} onClick={() => { setIsMenuSheetOpen(true); }} className="h-20 rounded-2xl bg-[#9F1239] relative overflow-hidden shadow-md cursor-pointer">
                     <div className="absolute inset-0 bg-gradient-to-br from-[#E11D48] to-[#9F1239] opacity-90"></div>
                     <div className="absolute inset-0 flex items-center justify-center">
                        <span className="text-white font-bold tracking-widest text-[11px] uppercase text-center px-2">{cat.name}</span>
                     </div>
                  </div>
                ))}
              </div>
            </section>

            {/* FULL FOOTER (MISSING IN LAST VERSION - ADDED BACK) */}
            <footer id="contact" className="bg-white border-t-8 pt-12 pb-32 px-6 mt-10 shadow-[0_-10px_40px_rgba(0,0,0,0.02)] relative z-10 reveal" style={{ borderColor: '#E11D48' }}>
              <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 text-center md:text-left">
                <div>
                  <div className="font-fashion text-3xl font-extrabold mb-3" style={{ color: '#9F1239' }}>Sridhani <br/><span style={{ color: '#E11D48' }}>Shoppy</span></div>
                  <p className="font-medium text-xs opacity-80 leading-relaxed" style={{ color: '#4C0519' }}>Premium Kids & Women's Wear. Grab the latest deals today!</p>
                </div>
                <div>
                  <h4 className="font-black text-lg mb-2 uppercase tracking-widest" style={{ color: '#E11D48' }}>Location</h4>
                  <p className="font-bold text-sm" style={{ color: '#4C0519' }}>📍 JP Complex,</p>
                  <p className="font-bold text-sm" style={{ color: '#4C0519' }}>Malli - 626141</p>
                </div>
                <div>
                  <h4 className="font-black text-lg mb-2 uppercase tracking-widest" style={{ color: '#E11D48' }}>Contact</h4>
                  <p className="font-black text-2xl" style={{ color: '#4C0519' }}>📞 +91 82202 80807</p>
                </div>
              </div>
            </footer>

            {/* FULL SCREEN SLIDING MENU (ALL PRODUCTS) */}
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm transition-all duration-500" style={{ zIndex: 70, opacity: isMenuSheetOpen ? 1 : 0, pointerEvents: isMenuSheetOpen ? 'auto' : 'none' }} onClick={() => setIsMenuSheetOpen(false)}></div>
            <div className="fixed left-0 w-full bg-white shadow-2xl transition-transform duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)]" style={{ bottom: 0, zIndex: 80, height: '80vh', display: 'flex', flexDirection: 'column', borderTopLeftRadius: '2rem', borderTopRightRadius: '2rem', transform: isMenuSheetOpen ? 'translateY(0)' : 'translateY(100vh)' }}>
               <div className="p-5 border-b border-gray-100 flex flex-col items-center relative shadow-sm">
                  <div className="w-12 h-1.5 bg-gray-200 rounded-full mb-4"></div>
                  <div className="w-full flex justify-between items-center pb-2">
                    <div>
                      <h3 className="font-fashion text-3xl font-extrabold" style={{ color: '#4C0519' }}>All Collections</h3>
                      <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">Select to add to bag</p>
                    </div>
                    <button onClick={() => setIsMenuSheetOpen(false)} className="btn-3d-close w-10 h-10 flex items-center justify-center rounded-full font-black text-lg">✕</button>
                  </div>
               </div>
               <div className="overflow-y-auto no-scrollbar flex-1 p-5 pb-32">
                  {allProducts.map(item => (
                     <div key={item.id} className="flex items-center justify-between mb-6 pb-6 border-b border-gray-100">
                        <div className="flex items-center gap-4">
                           <img src={item.img} alt={item.name} className="w-20 h-24 object-cover rounded-xl shadow-sm border border-gray-50" />
                           <div>
                              <h4 className="font-bold text-sm pr-2 line-clamp-2" style={{ color: '#4C0519' }}>{item.name}</h4>
                              <p className="text-[10px] font-black uppercase tracking-wider mb-2 mt-1" style={{ color: '#E11D48' }}>{item.category}</p>
                              <p className="text-lg font-black" style={{ color: '#9F1239' }}>₹{item.price}</p>
                           </div>
                        </div>
                        <button onClick={() => addToCart(item)} className="btn-3d-primary px-5 py-2.5 rounded-xl text-xs font-black shrink-0">ADD +</button>
                     </div>
                  ))}
               </div>
            </div>

            {/* DETAILED CART SHEET (WITH + AND -) */}
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm transition-all duration-500" style={{ zIndex: 95, opacity: isCartSheetOpen ? 1 : 0, pointerEvents: isCartSheetOpen ? 'auto' : 'none' }} onClick={() => setIsCartSheetOpen(false)}></div>
            <div className="fixed left-0 w-full bg-white shadow-2xl transition-transform duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)]" style={{ bottom: 0, zIndex: 100, height: '70vh', display: 'flex', flexDirection: 'column', borderTopLeftRadius: '2rem', borderTopRightRadius: '2rem', transform: isCartSheetOpen ? 'translateY(0)' : 'translateY(100vh)' }}>
               <div className="p-5 border-b border-gray-100 flex flex-col items-center relative bg-[#FFF1F2] rounded-t-[2rem]">
                  <div className="w-12 h-1.5 bg-gray-300 rounded-full mb-4"></div>
                  <div className="w-full flex justify-between items-center pb-2">
                    <div>
                      <h3 className="font-fashion text-2xl font-extrabold" style={{ color: '#9F1239' }}>Your Bag 🛍️</h3>
                      <p className="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1">{cart.length} items added</p>
                    </div>
                    <button onClick={() => setIsCartSheetOpen(false)} className="btn-3d-close w-10 h-10 flex items-center justify-center rounded-full font-black text-lg">✕</button>
                  </div>
               </div>
               
               <div className="overflow-y-auto no-scrollbar flex-1 p-5">
                  {uniqueCartItems.length === 0 ? (
                    <div className="flex flex-col items-center justify-center h-full opacity-50">
                      <span className="text-6xl mb-4">🛒</span>
                      <p className="font-bold">Your bag is empty!</p>
                    </div>
                  ) : (
                    uniqueCartItems.map(item => (
                                         <div key={item.id} className="flex items-center justify-between mb-4 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm">
                          <div className="flex items-center gap-3">
                             <img src={item.img} className="w-16 h-16 object-cover rounded-lg" />
                             <div>
                                <h4 className="font-bold text-xs" style={{ color: '#4C0519' }}>{item.name}</h4>
                                <p className="text-sm font-black mt-1" style={{ color: '#9F1239' }}>₹{item.price * item.count}</p>
                             </div>
                          </div>
                          <div className="flex items-center gap-3 bg-gray-50 p-1.5 rounded-xl border border-gray-200">
                            <button onClick={() => removeFromCart(item.id)} className="btn-action">−</button>
                            <span className="font-black text-sm w-4 text-center">{item.count}</span>
                            <button onClick={() => addToCart(item)} className="btn-action">+</button>
                          </div>
                       </div>
                    ))
                  )}
               </div>

               <div className="p-5 bg-white border-t border-gray-100 shadow-[0_-10px_20px_rgba(0,0,0,0.03)]">
                  <div className="flex justify-between items-center mb-4 px-2">
                    <span className="font-bold text-gray-500">Total Amount:</span>
                    <span className="text-2xl font-black" style={{ color: '#9F1239' }}>₹{cartTotal}</span>
                  </div>
                  <button onClick={handleWhatsAppCheckout} disabled={cart.length === 0} className={`w-full py-4 rounded-2xl text-white font-black text-sm flex items-center justify-center gap-2 transition-all ${cart.length === 0 ? 'bg-gray-300' : 'bg-[#25D366] shadow-[0_10px_20px_rgba(37,211,102,0.3)] active:scale-95'}`}>
                    <svg viewBox="0 0 448 512" fill="white" className="w-5 h-5"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zM223.9 414.7c-33.1 0-65.5-8.9-94-25.7l-6.7-4-69.8 18.3L72 334.1l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.5 82.5-184 184.2-184 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.2-186.2 184.2zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
                    Checkout via WhatsApp
                  </button>
               </div>
            </div>

            {/* BOTTOM NAV PILL */}
            <div className="fixed bottom-4 left-0 w-full px-4 flex justify-center pointer-events-none" style={{ zIndex: 90 }}>
              <div className="floating-nav pointer-events-auto bg-white/90 w-full max-w-md mx-auto flex justify-between items-center px-6 py-3 rounded-full border border-pink-50">
                
                <a href="#about" onClick={() => {setActiveTab('about'); setIsMenuSheetOpen(false); setIsCartSheetOpen(false);}} className="nav-item-3d flex flex-col items-center gap-1" style={{ color: activeTab === 'about' ? '#E11D48' : '#94A3B8' }}>
                  <span className="text-xl">🏢</span><span className="text-[9px] font-black uppercase">About</span>
                </a>

                <button onClick={() => { setActiveTab('shop'); setIsMenuSheetOpen(true); setIsCartSheetOpen(false);}} className="nav-item-3d flex flex-col items-center gap-1" style={{ color: activeTab === 'shop' ? '#E11D48' : '#94A3B8' }}>
                  <span className="text-xl">👗</span><span className="text-[9px] font-black uppercase">Shop</span>
                </button>
